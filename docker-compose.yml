services:
  api:
    build:
      context: ./server
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: ${PORT:-8080}
      DATABASE_URL: ${DATABASE_URL:-postgresql://familythings:familythings@postgres:5432/familythings?schema=public}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      JWT_SECRET: ${JWT_SECRET:-dev-family-things-secret-change-me-before-production}
      JWT_TTL_MINUTES: ${JWT_TTL_MINUTES:-43200}
      BCRYPT_SALT_ROUNDS: ${BCRYPT_SALT_ROUNDS:-12}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:8081,http://localhost:19006,http://127.0.0.1:8081}
      COOKIE_DOMAIN: ${COOKIE_DOMAIN:-localhost}
      ENABLE_WORKERS: ${ENABLE_WORKERS:-false}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      SMTP_HOST: ${SMTP_HOST:-mailhog}
      SMTP_PORT: ${SMTP_PORT:-1025}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      PUSH_PROVIDER: ${PUSH_PROVIDER:-expo}
      AI_PROVIDER: ${AI_PROVIDER:-local}
      WEATHER_API_KEY: ${WEATHER_API_KEY:-}
      SEED_DATABASE: ${SEED_DATABASE:-true}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/ready >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: familythings
      POSTGRES_USER: familythings
      POSTGRES_PASSWORD: familythings
    ports:
      - "55432:5432"
    volumes:
      - familythings_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U familythings -d familythings"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - familythings_redis:/data

  mailhog:
    image: mailhog/mailhog:v1.0.1
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  familythings_postgres:
  familythings_redis:
