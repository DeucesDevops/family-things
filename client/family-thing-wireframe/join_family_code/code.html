<div class="flex items-center gap-3">
<button class="text-[#0f5238] hover:opacity-80 transition-opacity scale-95 active:scale-90 transition-transform duration-200">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="font-['Newsreader'] font-bold text-2xl tracking-tight text-[#0f5238]">Step 4 of 5</h1>
</div>
<div class="flex items-center">
<div class="w-10 h-10 rounded-full bg-surface-container-high border-2 border-primary flex items-center justify-center overflow-hidden">
<img class="w-full h-full object-cover" data-alt="close up portrait of a smiling young father with warm lighting and a soft focus garden background" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDJygIYWAVh40HOiV_9k2r54v1ldwmmZQ9vFSHQ3sUkRKEl3MWH75yLUbJKBt-rZgHDUFfdHdB3AyVeKblnaBU-ExXHysMnDA5iX2zWSlsofWUEPE2ax2k_QoMMwCB1oBl2NaZ0j_tajdUAhTPI0K6I_ve7jgLRXhc9zlL_laRyOzqrUd2Q9VYJlH9vIMqSA6drChcFI0vb6JLxhCS-zRMh4jnZXkAC4tujf2DU8y81XLeLfWzMTvFFFZPfmPixE37_YjdpgtS9otY"/>

</div>

<main class="w-full max-w-md px-6 pt-12 pb-24 flex flex-col items-center flex-grow">
<!-- Hero Section -->
<div class="w-full text-center mb-12">
<div class="inline-block px-4 py-1.5 mb-6 bg-surface-container-low rounded-full">
<span class="text-secondary font-semibold text-xs tracking-widest uppercase">Joining In</span>
</div>
<h2 class="serif-headline text-4xl font-bold tracking-tight text-on-surface mb-4">Enter Your Family Code</h2>
<p class="text-on-surface-variant leading-relaxed px-4">
                Check your invitation or ask the head of your family for the 6-digit code.
            </p>
</div>
<!-- Code Entry Section -->
<div class="w-full space-y-10">
<div class="flex justify-between gap-2 md:gap-3 w-full max-w-sm mx-auto">
<!-- Code Inputs (Simulated Individually for Editorial feel) -->
<input class="w-12 h-16 text-center text-2xl font-bold serif-headline bg-surface-container-low rounded-xl border-none focus:ring-2 focus:ring-primary/20 text-primary uppercase placeholder-surface-variant" maxlength="1" placeholder="•" type="text"/>
<input class="w-12 h-16 text-center text-2xl font-bold serif-headline bg-surface-container-low rounded-xl border-none focus:ring-2 focus:ring-primary/20 text-primary uppercase placeholder-surface-variant" maxlength="1" placeholder="•" type="text"/>
<input class="w-12 h-16 text-center text-2xl font-bold serif-headline bg-surface-container-low rounded-xl border-none focus:ring-2 focus:ring-primary/20 text-primary uppercase placeholder-surface-variant" maxlength="1" placeholder="•" type="text"/>
<input class="w-12 h-16 text-center text-2xl font-bold serif-headline bg-surface-container-low rounded-xl border-none focus:ring-2 focus:ring-primary/20 text-primary uppercase placeholder-surface-variant" maxlength="1" placeholder="•" type="text"/>

<input class="w-12 h-16 text-center text-2xl font-bold serif-headline bg-surface-container-low rounded-xl border-none focus:ring-2 focus:ring-primary/20 text-primary uppercase placeholder-surface-variant" maxlength="1" placeholder="•" type="text"/>
</div>
<!-- Help Link -->
<div class="flex justify-center">
<button class="flex items-center gap-2 text-secondary font-semibold text-sm hover:underline decoration-2 underline-offset-4 transition-all">
<span class="material-symbols-outlined text-sm" data-icon="help">help</span>
                    Where is my code?
                </button>
</div>
<!-- Action Button -->
<div class="pt-4">
<button class="w-full py-5 px-6 rounded-full bg-gradient-to-br from-[#0f5238] to-[#2d6a4f] text-white font-bold text-lg shadow-lg shadow-primary/10 active:scale-[0.98] transition-all flex items-center justify-center gap-3">
                    Confirm &amp; Join
                    <span class="material-symbols-outlined" data-icon="chevron_right">chevron_right</span>
</button>
</div>
</div>
<!-- Secondary Visual Anchor (Bento Style) -->
<div class="mt-16 w-full grid grid-cols-1 gap-6">
<div class="bg-surface-container-lowest p-6 rounded-xl relative overflow-hidden flex items-center gap-6 group">
<div class="w-16 h-16 rounded-full bg-tertiary-fixed flex-shrink-0 flex items-center justify-center">
<span class="material-symbols-outlined text-tertiary text-3xl" data-icon="family_history" style="font-variation-settings: 'FILL' 1;">family_history</span>
</div>
<div>
<h3 class="font-bold text-on-surface">Joining a private space</h3>
<p class="text-sm text-on-surface-variant">Your data remains visible only to your family members.</p>
</div>
<!-- Decorative element -->
<div class="absolute -bottom-4 -right-4 w-24 h-24 bg-surface-container-low rounded-full opacity-50 group-hover:scale-110 transition-transform"></div>
