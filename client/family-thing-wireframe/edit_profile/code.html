<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,200..800;1,6..72,200..800&amp;family=Plus+Jakarta+Sans:wght@200..800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "on-primary-fixed-variant": "#0e5138",
                    "on-surface-variant": "#404943",
                    "secondary-fixed-dim": "#ffb59d",
                    "on-tertiary-fixed": "#2a1800",
                    "on-tertiary-fixed-variant": "#643f00",
                    "background": "#e9ffed",
                    "on-secondary-container": "#742406",
                    "on-tertiary": "#ffffff",
                    "primary-container": "#2d6a4f",
                    "on-surface": "#0b1f14",
                    "tertiary": "#653f00",
                    "surface-container": "#dcf4e1",
                    "error": "#ba1a1a",
                    "on-primary": "#ffffff",
                    "primary": "#0f5238",
                    "secondary": "#9d4223",
                    "on-tertiary-container": "#ffd29d",
                    "inverse-surface": "#213528",
                    "surface-tint": "#2c694e",
                    "surface-bright": "#e9ffed",
                    "inverse-on-surface": "#dff7e4",
                    "tertiary-fixed": "#ffddb6",
                    "on-primary-fixed": "#002114",
                    "on-error": "#ffffff",
                    "secondary-container": "#fe8c66",
                    "surface-container-low": "#e1fae7",
                    "tertiary-fixed-dim": "#ffb95a",
                    "secondary-fixed": "#ffdbd0",
                    "on-secondary-fixed-variant": "#7e2b0d",
                    "outline-variant": "#bfc9c1",
                    "surface": "#e9ffed",
                    "surface-variant": "#d0e8d6",
                    "primary-fixed": "#b1f0ce",
                    "surface-container-high": "#d6eedc",
                    "on-primary-container": "#a8e7c5",
                    "surface-dim": "#c8e0ce",
                    "on-secondary-fixed": "#390b00",
                    "error-container": "#ffdad6",
                    "surface-container-highest": "#d0e8d6",
                    "primary-fixed-dim": "#95d4b3",
                    "surface-container-lowest": "#ffffff",
                    "on-secondary": "#ffffff",
                    "inverse-primary": "#95d4b3",
                    "tertiary-container": "#855500",
                    "outline": "#707973",
                    "on-background": "#0b1f14"
            },
            "borderRadius": {
                    "DEFAULT": "1rem",
                    "lg": "2rem",
                    "xl": "3rem",
                    "full": "9999px"
            },
            "fontFamily": {
                    "headline": ["Newsreader"],
                    "body": ["Plus Jakarta Sans"],
                    "label": ["Plus Jakarta Sans"]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #e9ffed;
        }
        .serif-text {
            font-family: 'Newsreader', serif;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface min-h-screen">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-[#e9ffed]/80 backdrop-blur-xl shadow-[0_20px_40px_rgba(11,31,20,0.06)] flex justify-between items-center px-6 py-4">
<div class="flex items-center gap-4">
<button class="text-[#0f5238] hover:opacity-80 transition-opacity active:scale-95 transition-transform">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h1 class="font-serif italic text-2xl text-[#0f5238]">Edit Profile</h1>
</div>
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-[#0f5238]">search</span>
</div>
</header>
<main class="pt-24 pb-32 px-6 max-w-2xl mx-auto">
<!-- Profile Photo Section -->
<section class="flex flex-col items-center mb-12">
<div class="relative group">
<div class="w-32 h-32 rounded-full overflow-hidden border-4 border-surface-container-lowest shadow-lg">
<img class="w-full h-full object-cover" data-alt="portrait of a middle aged man with a warm smile in soft natural lighting, family patriarch vibe" src="https://lh3.googleusercontent.com/aida-public/AB6AXuC4zjdwc-vJh8IVoDmJeTzIgVuDDhOekRo97H5qIk5S0U2Ms77CLVyYuwBNQ09_NdvCcMFD09bQj18XOlWTPGkpuh4qPnDkqM6o8ApZ_wGVZmPSCK1rT_FKPD_rVjktnLWXungPL24mQg6Arl_fwF2vGWbWhEAOtBEs0x2r9a08Bplb6hUXYodhh3dGCUOH-e-ohkDY_G8-gBY-eSUG_OU05BeyGwWrHe_m59_Ujh9JxsBKWPuRtjExgYn4S-BsPcRCzL985nBYKWE"/>
</div>
<button class="absolute bottom-0 right-0 bg-secondary text-white p-2.5 rounded-full shadow-lg border-4 border-surface active:scale-90 transition-transform">
<span class="material-symbols-outlined text-sm">edit</span>
</button>
</div>
<p class="mt-4 font-label text-secondary font-semibold uppercase tracking-widest text-[11px]">Change Portrait</p>
</section>
<!-- Form Section -->
<form class="space-y-8">
<!-- Full Name -->
<div class="space-y-2">
<label class="font-serif text-lg text-primary ml-1">Full Name</label>
<div class="bg-surface-container-low rounded-full px-6 py-4 focus-within:ring-2 ring-primary/10 transition-all">
<input class="w-full bg-transparent border-none p-0 focus:ring-0 text-on-surface placeholder:text-on-surface-variant font-body" type="text" value="Arthur Montgomery"/>
</div>
</div>
<!-- Email (Read-Only) -->
<div class="space-y-2 opacity-70">
<label class="font-serif text-lg text-primary ml-1">Email Address</label>
<div class="bg-surface-variant/50 rounded-full px-6 py-4 border-none">
<input class="w-full bg-transparent border-none p-0 focus:ring-0 text-on-surface-variant font-body cursor-not-allowed" readonly="" type="email" value="arthur.m@hearth.app"/>
</div>
<p class="text-[10px] text-on-surface-variant px-6 italic">Email cannot be changed as it is linked to your family vault.</p>
</div>
<!-- Family Role -->
<div class="space-y-2">
<label class="font-serif text-lg text-primary ml-1">Family Role</label>
<div class="relative">
<select class="w-full bg-surface-container-low rounded-full px-6 py-4 border-none focus:ring-2 ring-primary/10 appearance-none font-body text-on-surface">
<option>Patriarch</option>
<option>Matriarch</option>
<option>Member</option>
<option>Chronicler</option>
</select>
<span class="material-symbols-outlined absolute right-6 top-1/2 -translate-y-1/2 text-primary pointer-events-none">expand_more</span>
</div>
</div>
<!-- Short Bio -->
<div class="space-y-2">
<label class="font-serif text-lg text-primary ml-1">Short Bio</label>
<div class="bg-surface-container-low rounded-xl px-6 py-4 focus-within:ring-2 ring-primary/10 transition-all">
<textarea class="w-full bg-transparent border-none p-0 focus:ring-0 text-on-surface placeholder:text-on-surface-variant font-body resize-none" placeholder="Share a bit about your place in the family story..." rows="4">Keep of the garden, baker of the Sunday loaf, and teller of the tall tales. Building a legacy for the little ones.</textarea>
</div>
</div>
<!-- Save Button Area -->
<div class="pt-6">
<button class="w-full py-5 bg-gradient-to-br from-primary to-primary-container text-on-primary rounded-full font-body font-bold text-lg shadow-xl active:scale-95 transition-transform" type="submit">
                    Save Changes
                </button>
<button class="w-full mt-4 py-3 text-secondary font-label font-bold text-sm uppercase tracking-widest hover:opacity-70 transition-opacity" type="button">
                    Deactivate Account
                </button>
</div>
</form>
</main>
<!-- Navigation suppressed for task-focused 'Edit' screen as per Shell Visibility rules -->
<!-- Toast Notification Simulation (Subtle UI depth) -->
<div class="fixed bottom-10 left-1/2 -translate-x-1/2 bg-surface-container-highest/90 backdrop-blur-md px-6 py-3 rounded-full border border-white/20 shadow-2xl flex items-center gap-3">
<span class="material-symbols-outlined text-primary text-sm">lock</span>
<span class="text-[12px] font-medium text-on-surface-variant">Your personal data is encrypted.</span>
</div>
</body></html>
