<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Set Up Your Family Circle</title>

            colors: {
              "background": "#e9ffed",
              "on-secondary-container": "#742406",

              "error-container": "#ffdad6",

              "on-primary": "#ffffff",
              "on-primary-container": "#a8e7c5",

              "surface": "#e9ffed",
              "on-secondary-fixed": "#390b00",
              "secondary-container": "#fe8c66",
              "on-surface-variant": "#404943",
              "tertiary-fixed-dim": "#ffb95a",
              "on-secondary": "#ffffff",
              "on-tertiary": "#ffffff",
              "on-surface": "#0b1f14",
              "surface-container-lowest": "#ffffff",
              "primary-container": "#2d6a4f",
              "error": "#ba1a1a",
              "on-error-container": "#93000a",
              "surface-container": "#dcf4e1",
              "surface-dim": "#c8e0ce",
              "tertiary-container": "#855500",

              "on-tertiary-fixed-variant": "#643f00",
              "outline": "#707973",

              "inverse-primary": "#95d4b3",

              "surface-tint": "#2c694e",
              "on-primary-fixed-variant": "#0e5138",
              "on-background": "#0b1f14",

              "label": ["Plus Jakarta Sans"]

            borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
          },
        },
      }

<style>
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-surface font-body min-h-screen selection:bg-secondary-container">
<!-- TopAppBar -->
<header class="sticky top-0 z-50 bg-[#e9ffed]/80 backdrop-blur-lg flex justify-between items-center px-6 py-4 w-full">
<div class="flex items-center gap-4">
<button class="text-[#0f5238] hover:opacity-80 transition-opacity scale-95 active:scale-90 transition-transform duration-200">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="font-['Newsreader'] font-bold text-2xl tracking-tight text-[#0f5238]">Step 5 of 5</h1>
</div>
<div class="w-10 h-10 rounded-full bg-surface-container-highest flex items-center justify-center overflow-hidden">
<img alt="User Profile" class="w-full h-full object-cover" data-alt="minimalist user avatar placeholder with soft lighting and natural green background" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDx3Q93p_ZGfcYRIlbUHdCMuBNUo3PRGwRD_ny0KIWVLFIf-5ii0TVUeRp-LnDSQHytDFKKSiaA963ImzR2l3hBu3IB9dNGXVdY9HsOrYyin2xh8aEojPHllPuUyxb7vhnaDglkGoe_vx2Mr0rENZiV9l7rJIotPfCPlQOXWMbIUboxchZE0ZXaXc9yViUEFriOudnXVnSBSqDQbwMYBFxahm_Kgth0ZzanxUWUNbCIdVGyDrRjUPbmKwqDsxLS1LwwiKERU_lJBXM"/>
</div>
</header>
<main class="max-w-xl mx-auto px-6 pt-12 pb-32">
<!-- Hero Section -->
<section class="mb-12">
<h2 class="font-headline font-bold text-5xl text-primary mb-4 leading-tight">
                Set Up Your <br/>
<span class="italic font-semibold text-secondary">Family Circle</span>
</h2>
<p class="text-on-surface-variant text-lg">Create a shared space for your family's most cherished moments and daily plans.</p>
</section>
<!-- Avatar Picker Section -->
<section class="mb-12">
<div class="relative flex justify-center mb-8">
<div class="w-40 h-40 rounded-xl bg-tertiary-fixed flex items-center justify-center shadow-[0_20px_40px_rgba(11,31,20,0.06)] relative overflow-hidden group">
<span class="material-symbols-outlined text-tertiary text-6xl" data-icon="family_history">family_history</span>
<button class="absolute bottom-0 right-0 p-3 bg-secondary text-white rounded-tl-xl hover:bg-on-secondary-fixed-variant transition-colors">
<span class="material-symbols-outlined text-xl" data-icon="photo_camera">photo_camera</span>
</button>
<img alt="Family Photo" class="absolute inset-0 w-full h-full object-cover opacity-0 group-hover:opacity-100 transition-opacity duration-300" data-alt="Warm sun-drenched photo of a happy multi-generational family laughing together in a garden setting" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCZitE-mu9H1RNssUKCUWZNTdy7MC2yYs7PPAb_CThuzxjEgev8ckuFghwCcbTdAJa3zaL1SJfg06M_DvBya4dGSIr7gSi5RTzzmtBBK_jhx_tBViE89BoZFNT-FAKTA8-TYV_dhIbn6i_ZwhROfk55UYQI7lqDGVO3eWB4ST7iRVJnd0GKJbTWOOfOi5jGXwoiztatgjclGuIQDvECuuaim3g-z1R_iTK9E6H470kyFW5FHuY2vlEYa_uf3PGu3KegkA8JId-giFg"/>
</div>
</div>
<!-- Avatar Options -->
<div class="flex justify-center gap-4 mb-4">
<div class="w-12 h-12 rounded-full bg-secondary-container flex items-center justify-center text-on-secondary-container cursor-pointer border-2 border-transparent hover:border-secondary transition-all">
<span class="material-symbols-outlined" data-icon="house">house</span>
</div>
<div class="w-12 h-12 rounded-full bg-tertiary-fixed-dim flex items-center justify-center text-on-tertiary-fixed cursor-pointer border-2 border-transparent hover:border-tertiary transition-all">
<span class="material-symbols-outlined" data-icon="pets">pets</span>
</div>
<div class="w-12 h-12 rounded-full bg-primary-fixed flex items-center justify-center text-on-primary-fixed cursor-pointer border-2 border-secondary transition-all">
<span class="material-symbols-outlined" data-icon="favorite" style="font-variation-settings: 'FILL' 1;">favorite</span>
</div>
<div class="w-12 h-12 rounded-full bg-surface-container-high flex items-center justify-center text-outline cursor-pointer border-2 border-transparent hover:border-primary transition-all">
<span class="material-symbols-outlined" data-icon="add">add</span>
</div>
</div>
<p class="text-center text-sm font-medium text-secondary">Choose a family icon</p>
</section>
<!-- Form Inputs -->
<div class="space-y-8">
<div class="group">
<label class="block text-sm font-semibold text-primary mb-2 ml-4" for="family-name">Family Name</label>
<div class="relative">
<input class="w-full px-6 py-4 bg-surface-container-low border-none rounded-full focus:ring-2 focus:ring-primary/10 text-on-surface placeholder:text-on-surface-variant/40 transition-all outline-none" id="family-name" placeholder="e.g., The Banda Family" type="text"/>
<div class="absolute right-6 top-1/2 -translate-y-1/2 text-primary/30">
<span class="material-symbols-outlined" data-icon="group">group</span>
</div>
</div>
</div>
<div class="group">
<label class="block text-sm font-semibold text-primary mb-2 ml-4" for="user-name">Your Name</label>
<div class="relative">
<input class="w-full px-6 py-4 bg-surface-container-low border-none rounded-full focus:ring-2 focus:ring-primary/10 text-on-surface placeholder:text-on-surface-variant/40 transition-all outline-none" id="user-name" placeholder="How your family knows you" type="text"/>
<div class="absolute right-6 top-1/2 -translate-y-1/2 text-primary/30">
<span class="material-symbols-outlined" data-icon="person_edit">person_edit</span>
</div>
</div>
</div>
</div>
<!-- Role Suggestions (Asymmetric Bento Style) -->
<div class="mt-10 grid grid-cols-2 gap-3">
<div class="col-span-1 p-4 bg-surface-container rounded-xl flex items-center gap-3 cursor-pointer hover:bg-surface-variant transition-colors">
<span class="material-symbols-outlined text-secondary" data-icon="shield_person">shield_person</span>
<span class="text-sm font-medium">Head of Family</span>
</div>
<div class="col-span-1 p-4 bg-surface-container-lowest rounded-xl flex items-center gap-3 cursor-pointer hover:bg-surface-variant transition-colors">
<span class="material-symbols-outlined text-tertiary" data-icon="edit_calendar">edit_calendar</span>
<span class="text-sm font-medium">Organizer</span>
</div>
</div>
</main>
<!-- Bottom Action Bar (Floating) -->
<div class="fixed bottom-0 left-0 w-full p-6 z-40 flex justify-center">
<button class="w-full max-w-md bg-gradient-to-br from-[#0f5238] to-[#2d6a4f] text-white py-5 px-8 rounded-full font-bold text-lg shadow-[0_10px_30px_rgba(15,82,56,0.2)] hover:opacity-90 active:scale-95 transition-all duration-200 flex items-center justify-center gap-3">
            Finish Setup
            <span class="material-symbols-outlined" data-icon="check_circle" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</button>
</div>
</body></html>
