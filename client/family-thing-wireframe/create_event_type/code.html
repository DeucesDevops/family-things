            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;

<body class="bg-surface text-on-surface min-h-screen flex flex-col items-center">
<!-- TopAppBar -->
<header class="bg-[#e9ffed]/80 dark:bg-emerald-950/80 backdrop-blur-xl docked full-width top-0 sticky z-40 shadow-sm dark:shadow-none w-full h-16 flex justify-between items-center px-6">
<button class="text-emerald-900 dark:text-emerald-50 hover:opacity-80 transition-opacity active:scale-95 duration-200">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="text-lg font-serif italic tracking-tight text-emerald-900 dark:text-emerald-50">New Family Memory</h1>
<span class="text-emerald-700/60 font-sans uppercase tracking-widest text-[10px] font-bold">Step 1 of 4</span>
</header>
<main class="max-w-xl w-full px-6 py-12 flex flex-col flex-1">
<!-- Step Indicator -->
<div class="flex justify-center gap-3 mb-10">
<div class="w-2.5 h-2.5 rounded-full bg-primary"></div>
<div class="w-2.5 h-2.5 rounded-full bg-surface-container-high"></div>
<div class="w-2.5 h-2.5 rounded-full bg-surface-container-high"></div>
<div class="w-2.5 h-2.5 rounded-full bg-surface-container-high"></div>
</div>
<!-- Section Title -->
<div class="mb-12 text-center">
<h2 class="text-4xl font-headline italic mb-3">What are we doing?</h2>
<p class="text-on-surface-variant font-body text-sm tracking-wide">Choose the theme of your next family adventure.</p>
</div>
<!-- Bento Grid Selection -->
<div class="grid grid-cols-2 md:grid-cols-3 gap-6 mb-24">
<!-- Selected Card: Eat-out -->
<button class="relative aspect-square flex flex-col items-center justify-center p-6 bg-surface-container-lowest rounded-xl ring-2 ring-primary ring-offset-4 ring-offset-surface hover:brightness-110 transition-all active:scale-98">
<span class="text-5xl mb-4 grayscale-0">🍽️</span>
<span class="font-body font-bold text-sm text-primary uppercase tracking-wider">Eat-out</span>
<div class="absolute top-3 right-3 bg-primary text-on-primary rounded-full p-1 shadow-sm">
<span class="material-symbols-outlined text-[14px]" style="font-variation-settings: 'FILL' 1;">check</span>
</div>
</button>
<!-- Card: Holiday -->
<button class="aspect-square flex flex-col items-center justify-center p-6 bg-surface-container-low rounded-xl hover:bg-surface-container-highest transition-all active:scale-98">
<span class="text-5xl mb-4">🏖️</span>
<span class="font-body font-semibold text-sm text-on-surface-variant uppercase tracking-wider">Holiday</span>
</button>
<!-- Card: Party -->
<button class="aspect-square flex flex-col items-center justify-center p-6 bg-surface-container-low rounded-xl hover:bg-surface-container-highest transition-all active:scale-98">
<span class="text-5xl mb-4">🎉</span>
<span class="font-body font-semibold text-sm text-on-surface-variant uppercase tracking-wider">Party</span>
</button>
<!-- Card: Activity -->
<button class="aspect-square flex flex-col items-center justify-center p-6 bg-surface-container-low rounded-xl hover:bg-surface-container-highest transition-all active:scale-98">
<span class="text-5xl mb-4">🎯</span>
<span class="font-body font-semibold text-sm text-on-surface-variant uppercase tracking-wider">Activity</span>
</button>
<!-- Card: Trip -->
<button class="aspect-square flex flex-col items-center justify-center p-6 bg-surface-container-low rounded-xl hover:bg-surface-container-highest transition-all active:scale-98">
<span class="text-5xl mb-4">✈️</span>
<span class="font-body font-semibold text-sm text-on-surface-variant uppercase tracking-wider">Trip</span>
</button>
<!-- Card: Show -->
<button class="aspect-square flex flex-col items-center justify-center p-6 bg-surface-container-low rounded-xl hover:bg-surface-container-highest transition-all active:scale-98">
<span class="text-5xl mb-4">🎭</span>
<span class="font-body font-semibold text-sm text-on-surface-variant uppercase tracking-wider">Show</span>
</button>
</div>
<!-- Decorative Surface Image -->
<div class="relative h-48 rounded-xl overflow-hidden mb-12 shadow-sm">
<img alt="Warm family gathering around a wooden dining table with candlelight and soft evening glow" class="w-full h-full object-cover brightness-75" data-alt="Candid moment of a family sharing a meal around a rustic wooden table with soft candle lighting and warm amber tones" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCi8jnafuw42b2kCb0RURAljw-dCyXrmqDmr9c_YzCU7ne6lcbCH88cSgrFM2cWMvQOU6GGRyUcL9wYepNkc8phXyBM6gDlR81ti-aiJ0WzveiZTcniQFhXRMbvbc820_1lB7bFhIzNlVaNe7P6shzSNxRqfBg47gzT84poJgc6YMdnNNrfOwJDwLzUIR1EgcfmeAEb9Xm4Lx_Fye7tRUvMiO14rqgTbvqajueBXQCsPT8zVVrklIDmu2GYF9mEU8i3gj_GPh2ypZ0"/>

</div>
</div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-between items-center px-10 pb-8 pt-4 bg-[#e9ffed]/90 dark:bg-emerald-950/90 backdrop-blur-2xl rounded-t-[3rem] shadow-[0_-20px_40px_rgba(11,31,20,0.06)]">

<button class="flex flex-col items-center justify-center text-emerald-800 dark:text-emerald-200 px-8 py-3 hover:brightness-110 transition-all active:scale-98">
<span class="material-symbols-outlined mb-1" data-icon="chevron_left">chevron_left</span>
<span class="font-sans uppercase tracking-widest text-[10px] font-bold">Back</span>
</button>
<!-- Primary Action: Next -->
<button class="flex flex-col items-center justify-center bg-gradient-to-r from-[#0f5238] to-[#2d6a4f] text-white rounded-full px-12 py-3 hover:brightness-110 transition-all active:scale-95 shadow-lg">
<div class="flex items-center gap-2">
<span class="font-sans uppercase tracking-widest text-[11px] font-bold">Next Step</span>
<span class="material-symbols-outlined text-[18px]" data-icon="chevron_right">chevron_right</span>

</button>
