<div class="flex-grow h-px bg-outline-variant/30"></div>

<div class="space-y-1">

<input class="w-full bg-surface-container-low border-none rounded-full px-6 py-4 font-body text-on-surface placeholder:text-on-surface-variant/50 focus:ring-2 focus:ring-primary/10 focus:bg-surface-container transition-all outline-none" placeholder="jane.doe@family.com" type="email"/>
</div>
<button class="w-full py-4 px-6 rounded-full bg-surface-container-highest text-on-surface font-semibold transition-transform duration-200 active:scale-95 hover:bg-surface-variant">

</form>
</div>

<button class="flex items-center gap-2 text-secondary font-semibold hover:opacity-80 transition-opacity">
<span class="material-symbols-outlined" data-icon="group_add">group_add</span>
