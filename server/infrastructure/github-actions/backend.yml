name: Backend

on:
  pull_request:
    paths:
      - "server/**"
  push:
    branches:
      - main
    paths:
      - "server/**"

jobs:
  validate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: familythings
          POSTGRES_USER: familythings
          POSTGRES_PASSWORD: familythings
        ports:
          - "55432:5432"
        options: >-
          --health-cmd "pg_isready -U familythings -d familythings"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: server/package-lock.json
      - run: npm ci
      - run: npm run db:generate
      - run: npm run typecheck
      - run: npm test
