apiVersion: v1
kind: Secret
metadata:
  name: family-things-api-secrets
  namespace: family-things
type: Opaque
stringData:
  NODE_ENV: production
  PORT: "8080"
  DATABASE_URL: postgresql://user:password@postgres:5432/familythings?schema=public
  REDIS_URL: redis://redis:6379
  JWT_SECRET: replace-with-a-long-random-secret
  CORS_ALLOWED_ORIGINS: https://app.example.com
