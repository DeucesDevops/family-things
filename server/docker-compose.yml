services:
  api:
    build:
      context: .
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://familythings:familythings@postgres:5432/familythings?schema=public
      REDIS_URL: redis://redis:6379
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: familythings
      POSTGRES_USER: familythings
      POSTGRES_PASSWORD: familythings
    ports:
      - "55432:5432"
    volumes:
      - familythings_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U familythings -d familythings"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - familythings_redis:/data

  mailhog:
    image: mailhog/mailhog:v1.0.1
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  familythings_postgres:
  familythings_redis:
